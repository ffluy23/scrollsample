<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Side Scroll</title>
  <style>
  html, body { height: 100%; margin: 0; background: #111; color: #ddd; font-family: system-ui, sans-serif; }
.wrap { display: grid; place-items: center; gap: 10px; padding: 20px; }
#game { background: #1b1b1b; border: 1px solid #333; border-radius: 10px; }
.hint { opacity: .8; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="900" height="450"></canvas>
    <div class="hint">← → 이동 / Shift 달리기 / Space 점프</div>
  </div>

  <script>
	  const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 눌림 유지
const keys = new Set();
addEventListener("keydown", (e) => {
  // 스페이스 스크롤 방지
  if (e.code === "Space") e.preventDefault();
  keys.add(e.code);
});
addEventListener("keyup", (e) => keys.delete(e.code));

// --- 월드 설정 ---
const world = {
  width: 4000,
  groundY: 380,
  gravity: 2200,
};

// 발판들
const platforms = [
  { x: 0, y: world.groundY, w: world.width, h: 70 },
  { x: 650, y: 310, w: 260, h: 20 },
  { x: 1100, y: 270, w: 220, h: 20 },
  { x: 1600, y: 320, w: 260, h: 20 },
  { x: 2200, y: 280, w: 240, h: 20 },
  { x: 3000, y: 330, w: 300, h: 20 },
];

// --- 플레이어 ---
const player = {
  x: 120,
  y: 100,
  w: 44,
  h: 60,
  vx: 0,
  vy: 0,
  speed: 420,
  runMul: 1.55,
  jump: 820,
  onGround: false,
  facing: 1, 
};

// --- 카메라(월드 오프셋) ---
const camera = {
  x: 0,
  y: 0,
};

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// AABB 충돌 보조
function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// 플랫폼 충돌
function resolvePlatformCollisions(prevX, prevY) {
  player.onGround = false;

  for (const p of platforms) {
    if (!aabb(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) continue;

    // 이전 프레임에서 플레이어 바닥이 플랫폼 위였고, 이번에 파고든 경우 = 착지
    const prevBottom = prevY + player.h;
    const currBottom = player.y + player.h;

    const wasAbove = prevBottom <= p.y + 1;
    const isFallingInto = currBottom >= p.y && player.vy >= 0;

    if (wasAbove && isFallingInto) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }
}

let last = performance.now();

function update(dt) {
  const left = keys.has("ArrowLeft") || keys.has("KeyA");
  const right = keys.has("ArrowRight") || keys.has("KeyD");
  const run = keys.has("ShiftLeft") || keys.has("ShiftRight");
  const jump = keys.has("Space");

  // 수평 이동
  const targetSpeed = player.speed * (run ? player.runMul : 1);

  if (left && !right) {
    player.vx = -targetSpeed;
    player.facing = -1;
  } else if (right && !left) {
    player.vx = targetSpeed;
    player.facing = 1;
  } else {
    // 마찰 느낌
    player.vx *= 0.82;
    if (Math.abs(player.vx) < 10) player.vx = 0;
  }

  // 점프
  if (jump && player.onGround) {
    player.vy = -player.jump;
    player.onGround = false;
  }

  // 중력
  player.vy += world.gravity * dt;

  // 이동 적용 + 충돌
  const prevX = player.x;
  const prevY = player.y;

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // 월드 경계
  player.x = clamp(player.x, 0, world.width - player.w);

  // 바닥/플랫폼
  resolvePlatformCollisions(prevX, prevY);

  // 카메라
  const desiredCamX = player.x + player.w / 2 - canvas.width / 2;
  camera.x = clamp(desiredCamX, 0, world.width - canvas.width);
}

function drawBackground() {
  // 하늘
  ctx.fillStyle = "#1b1b1b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  //대충...
  ctx.save();
  ctx.translate(-camera.x * 0.4, 0);
  ctx.fillStyle = "#222";
  for (let i = 0; i < 80; i++) {
    const x = i * 120;
    ctx.fillRect(x, 70, 40, 10);
  }
  ctx.restore();
}

function drawPlatforms() {
  ctx.fillStyle = "#2f2f2f";
  for (const p of platforms) {
    const sx = p.x - camera.x;
    ctx.fillRect(sx, p.y, p.w, p.h);
  }
}

function drawPlayer() {
  const sx = player.x - camera.x;
  const sy = player.y;

  // 몸통
  ctx.fillStyle = "#5aa9ff";
  ctx.fillRect(sx, sy, player.w, player.h);

  // 얼굴/방향 표시
  ctx.fillStyle = "#0b0b0b";
  const eyeY = sy + 18;
  if (player.facing === 1) {
    ctx.fillRect(sx + 28, eyeY, 6, 6);
    ctx.fillRect(sx + 18, eyeY, 6, 6);
    // 코
    ctx.fillRect(sx + 36, sy + 28, 4, 4);
  } else {
    ctx.fillRect(sx + 10, eyeY, 6, 6);
    ctx.fillRect(sx + 20, eyeY, 6, 6);
    // 코
    ctx.fillRect(sx + 4, sy + 28, 4, 4);
  }
}

function drawHUD() {
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(12, 12, 240, 60);

  ctx.fillStyle = "#ddd";
  ctx.font = "14px system-ui, sans-serif";
  ctx.fillText(`x: ${player.x.toFixed(0)} / ${world.width}`, 22, 34);
  ctx.fillText(`facing: ${player.facing === 1 ? "right" : "left"}`, 22, 54);
}

function render() {
  drawBackground();
  drawPlatforms();
  drawPlayer();
  drawHUD();
}

function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;

  update(dt);
  render();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
  </script>
</body>
</html>
